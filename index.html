<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 我们的纪念册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/book.css">
    <style>
        /* ===== PC端拦截遮罩 ===== */
        .desktop-blocker {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0A1225 0%, #0F1A2E 40%, #1A2744 100%);
            font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
            text-align: center;
            padding: 30px;
        }

        .desktop-blocker.show {
            display: flex;
        }

        .blocker-content {
            max-width: 400px;
        }

        .blocker-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .blocker-title {
            font-family: 'Ma Shan Zheng', 'KaiTi', cursive;
            font-size: 2rem;
            color: #F0D5B0;
            margin-bottom: 16px;
            letter-spacing: 4px;
        }

        .blocker-text {
            font-size: 1rem;
            color: rgba(240, 213, 176, 0.7);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .blocker-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #D4A574, transparent);
            margin: 0 auto 24px;
        }

        .blocker-qr {
            width: 160px;
            height: 160px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: rgba(240, 213, 176, 0.4);
            margin-bottom: 16px;
        }

        .blocker-hint {
            font-size: 0.85rem;
            color: rgba(240, 213, 176, 0.35);
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- ===== PC端拦截遮罩 ===== -->
    <div class="desktop-blocker" id="desktopBlocker">
        <div class="blocker-content">
            <span class="blocker-icon">📱</span>
            <div class="blocker-title">请用手机打开</div>
            <div class="blocker-divider"></div>
            <p class="blocker-text">
                这是一本为移动端设计的纪念册<br>
                请用手机扫描二维码<br>
                或直接在手机浏览器中打开
            </p>
            <div class="blocker-qr">📖 扫码访问</div>
            <p class="blocker-hint">—— 用手机翻开我们的故事 ——</p>
        </div>
    </div>

    <!-- ===== 背景装饰 ===== -->
    <div class="book-bg" aria-hidden="true">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="book-wrapper">
        <div class="book-container" id="bookContainer">
            <!-- 书脊 -->
            <div class="book-spine" aria-hidden="true">
                <div class="spine-line"></div>
                <div class="spine-dots">
                    <span class="spine-dot"></span><span class="spine-dot"></span>
                    <span class="spine-dot"></span><span class="spine-dot"></span>
                    <span class="spine-dot"></span>
                </div>
            </div>
            <!-- 页面 -->
            <div class="book-pages" id="bookPages"></div>
            <!-- 翻页阴影 -->
            <div class="flip-shadow" id="flipShadow"></div>
            <!-- 翻页角落 -->
            <div class="page-corner page-corner-right" id="cornerRight"><span class="corner-icon">⟩</span></div>
            <div class="page-corner page-corner-left" id="cornerLeft"><span class="corner-icon">⟨</span></div>
            <!-- 滑动提示 -->
            <div class="swipe-hint" id="swipeHint">👆 左右滑动翻页</div>
        </div>

        <!-- 底部控件 -->
        <div class="book-controls">
            <button class="ctrl-btn" id="prevBtn" aria-label="上一页">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="page-indicator">
                <span class="page-current" id="pageCurrent">1</span>
                <span class="page-sep">/</span>
                <span class="page-total" id="pageTotal">1</span>
            </div>
            <button class="ctrl-btn" id="nextBtn" aria-label="下一页">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button class="ctrl-btn ctrl-toc" id="tocBtn" aria-label="目录">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>

        <!-- 进度条 -->
        <div class="reading-progress">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- ===== 书架装饰 ===== -->
    <div class="bookshelf" aria-hidden="true">
        <div class="shelf-line"></div>
        <div class="shelf-ornament shelf-left">❦</div>
        <div class="shelf-ornament shelf-right">❦</div>
    </div>

    <!-- ===== 目录面板 ===== -->
    <div class="toc-overlay" id="tocOverlay">
        <div class="toc-panel" id="tocPanel">
            <div class="toc-header">
                <h2 class="toc-title">📖 目 录</h2>
                <button class="toc-close" id="tocClose">✕</button>
            </div>
            <div class="toc-list" id="tocList"></div>
            <div class="toc-footer">
                <span class="toc-total">共 <strong id="tocTotalPages">0</strong> 页 · <strong id="tocTotalEntries">0</strong> 篇回忆</span>
            </div>
        </div>
    </div>

    <!-- ===== 灯箱 ===== -->
    <div class="lb-overlay" id="lbOverlay">
        <button class="lb-close" id="lbClose">✕</button>
        <button class="lb-nav lb-prev" id="lbPrev">‹</button>
        <button class="lb-nav lb-next" id="lbNext">›</button>
        <img class="lb-img" id="lbImg" src="" alt="">
        <div class="lb-counter" id="lbCounter"></div>
    </div>

    <script>
        // ===== 移动端检测 =====
        (function() {
            var isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(navigator.userAgent);
            var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            var isSmallScreen = window.innerWidth < 1024;

            // 非移动端 → 显示拦截遮罩，隐藏书内容
            if (!isMobile && !(isTouchDevice && isSmallScreen)) {
                document.getElementById('desktopBlocker').classList.add('show');
                // 隐藏书内容
                var bookWrapper = document.querySelector('.book-wrapper');
                if (bookWrapper) bookWrapper.style.display = 'none';
                var bookshelf = document.querySelector('.bookshelf');
                if (bookshelf) bookshelf.style.display = 'none';
            }
        })();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
